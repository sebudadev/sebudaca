    <script>

      // Simple playlist array (replace with your own mp3/ogg files and titles)
      const playlist = [
        { title: "Kodak Black - Love & War", src: "https://audio.jukehost.co.uk/Kzc6MFnCmYhH9a1yF2jOESHekM2tFOFS" },
        { title: "Kodak_Black - Roll in Peace ", src: "https://audio.jukehost.co.uk/yiW43Xnbaaj52GUemT7d5Ohp3AHsUjN5" },
      ];

      const audio = document.getElementById('audio-player');
      const playBtn = document.getElementById('play-btn');
      const playIcon = document.getElementById('play-icon');
      const pauseIcon = document.getElementById('pause-icon');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const musicTitle = document.getElementById('music-title');
      const playlistDiv = document.getElementById('music-playlist');
      const volumeSlider = document.getElementById('volume-slider');

      let currentTrack = 0;
      let isPlaying = false;

      function loadTrack(index) {
        audio.src = playlist[index].src;
        musicTitle.textContent = playlist[index].title;
        document.querySelectorAll('.playlist-item').forEach((el, i) => {
          el.classList.toggle('active', i === index);
        });
      }

      function playPause() {
        if (audio.paused) {
          audio.play();
          playIcon.style.display = 'none';
          pauseIcon.style.display = '';
          isPlaying = true;
        } else {
          audio.pause();
          playIcon.style.display = '';
          pauseIcon.style.display = 'none';
          isPlaying = false;
        }
      }

      function playTrack(index) {
        currentTrack = index;
        loadTrack(currentTrack);
        audio.play();
        playIcon.style.display = 'none';
        pauseIcon.style.display = '';
        isPlaying = true;
      }

      function nextTrack() {
        currentTrack = (currentTrack + 1) % playlist.length;
        playTrack(currentTrack);
      }

      function prevTrack() {
        currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
        playTrack(currentTrack);
      }

      // Render playlist
      playlistDiv.innerHTML = '';
      playlist.forEach((track, i) => {
        const btn = document.createElement('button');
        btn.className = 'playlist-item' + (i === 0 ? ' active' : '');
        btn.textContent = track.title;
        btn.onclick = () => playTrack(i);
        playlistDiv.appendChild(btn);
      });

      // Initial load
      loadTrack(currentTrack);

      // Event listeners
      playBtn.onclick = playPause;
      nextBtn.onclick = nextTrack;
      prevBtn.onclick = prevTrack;
      audio.onended = nextTrack;

      // Volume control
      volumeSlider.oninput = (e) => {
        audio.volume = e.target.value;
      };
